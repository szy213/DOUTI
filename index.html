<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOUDOU乐队性格测试 - 探寻生命中留住的瞬间</title>
    <!-- 引入 Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Lucide 图标库 -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Noto+Sans+SC:wght@300;400&display=swap');
        
        body {
            background-color: #0d0221;
            color: #f3e8ff;
            font-family: 'Noto Sans SC', sans-serif;
            overflow-x: hidden;
        }

        .font-serif {
            font-family: 'Noto Serif SC', serif;
        }

        .glass {
            background: rgba(26, 11, 46, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(168, 85, 247, 0.3);
        }

        /* 基础进入动画 */
        .fade-in {
            animation: fadeIn 0.8s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 题目切换动画 */
        .slide-out {
            animation: slideOut 0.4s ease-in forwards;
        }

        .slide-in {
            animation: slideIn 0.5s ease-out forwards;
        }

        @keyframes slideOut {
            from { opacity: 1; transform: translateX(0); }
            to { opacity: 0; transform: translateX(-20px); }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .perspective-1000 { perspective: 1000px; }
        
        /* 进度条平滑过渡 */
        #progress-bar {
            transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- 背景装饰 -->

    <div id="app" class="relative z-10 w-full max-w-lg">

        <div id="start-screen" class="text-center space-y-12 fade-in">

                </div>

                    DOUTI
                </h1>
                <p class="text-purple-300/60 tracking-[0.5em] text-xs uppercase">探寻生命中无法留住的瞬间</p>
            </div>
            <button onclick="startQuiz()" class="group relative px-16 py-5 bg-transparent border border-purple-500/50 hover:border-purple-300 transition-all duration-500">
                <span class="relative tracking-[0.8em] flex items-center gap-2 text-sm">
                    开启仪式 <i data-lucide="chevron-right" class="w-4 h-4"></i>
                </span>
            </button>
        </div>

        <!-- 答题页面 -->
        <div id="quiz-screen" class="hidden">
            <div class="glass p-8 rounded-2xl shadow-2xl min-h-[580px] flex flex-col relative overflow-hidden">
                <!-- 进度条背景 -->
                <div class="absolute top-0 left-0 w-full h-1 bg-purple-900/30">
                    <div id="progress-bar" class="h-full bg-gradient-to-r from-purple-600 to-indigo-400" style="width: 0%"></div>
                </div>

                <div class="flex justify-between items-center mb-10 mt-2">
                    <button id="back-btn" onclick="handleBack()" class="p-2 text-purple-400 hover:text-purple-200 transition-colors">
                        <i data-lucide="arrow-left" class="w-5 h-5"></i>
                    </button>
                    <span id="progress-text" class="text-[10px] tracking-[0.4em] text-purple-400/60 uppercase">1 / 12</span>
                    <div class="w-4 h-4 rounded-full border border-purple-500/30 border-t-purple-500 animate-spin"></div>
                </div>
                
                <!-- 题目内容容器，用于动画切换 -->
                <div id="question-content" class="flex flex-col flex-grow">
                    <h2 id="question-text" class="text-xl mb-auto font-serif leading-relaxed text-purple-100"></h2>
                    <div id="options-container" class="space-y-4 mt-8">
                        <!-- 选项由 JS 动态生成 -->
                    </div>
                </div>
            </div>
        </div>

        <!-- 结果页面 -->
        <div id="result-screen" class="hidden fade-in">
            <div class="glass p-10 rounded-3xl shadow-2xl text-center space-y-8">
                <div class="space-y-3">
                    <p class="text-[10px] tracking-[0.6em] text-purple-400/70 uppercase">共鸣的结果</p>
                    <h2 id="result-title" class="text-5xl font-serif text-white"></h2>
                </div>

                <div class="py-10 border-y border-purple-500/20">
                    <p id="result-lyrics" class="italic text-purple-200/90 text-lg leading-relaxed font-serif"></p>
                </div>

                <div class="text-left bg-white/5 p-6 rounded-2xl border border-purple-500/10">

                <div class="flex flex-col gap-4 pt-4">

                        <i data-lucide="external-link" class="w-4 h-4"></i> 在网易云打开

            </div>

    </div>

            "INFJ": { title: "《南三环东路》", lyrics: "莫要哭，莫要怕，走过了东路就到家", analysis: "你是温良的守望者。你的灵魂里藏着一种慈悲，懂得的重量。在时间的河流里，你总是倾向于在人文关怀中寻找前行的力量。", link: "https://music.163.com/song?id=2052454512" },

        function startQuiz() {
            showScreen('quiz-screen');
            renderQuestion(true); // 初次加载不使用左右滑动画
        }

        // 渲染题目
        function renderQuestion(isFirst = false) {
            const q = QUESTIONS[currentIdx];
            const content = document.getElementById('question-content');
            
            // 如果不是第一次进入，添加进入动画
            if (!isFirst) {
                content.classList.remove('slide-out');
                content.classList.add('slide-in');
                // 动画结束后移除类，以便下次使用
                setTimeout(() => content.classList.remove('slide-in'), 500);
            }

            // 更新进度
            const progress = ((currentIdx + 1) / QUESTIONS.length) * 100;
            document.getElementById('progress-bar').style.width = `${progress}%`;
            document.getElementById('progress-text').innerText = `${currentIdx + 1} / ${QUESTIONS.length}`;
            
            // 更新文字内容
            document.getElementById('question-text').innerText = q.text;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-5 rounded-xl bg-purple-900/10 border border-purple-500/10 hover:bg-purple-800/20 hover:border-purple-500/40 transition-all group flex items-center gap-4";
                btn.innerHTML = `
                    <span class="text-[9px] font-serif text-purple-500/50">0${i+1}</span>
                    <span class="text-sm tracking-widest text-purple-200/80 group-hover:text-white">${opt.text}</span>
                `;
                btn.onclick = () => handleAnswer(opt.scores);
                container.appendChild(btn);
            });

            // 控制返回按钮
            document.getElementById('back-btn').style.opacity = currentIdx === 0 ? '0' : '1';
            document.getElementById('back-btn').disabled = currentIdx === 0;
            
            isAnimating = false;
        }

        // 处理回答
        function handleAnswer(scores) {
            if (isAnimating) return;
            isAnimating = true;

            const content = document.getElementById('question-content');
            content.classList.add('slide-out');

            // 记录分数
            for (let key in scores) userScores[key] += scores[key];
            history.push(scores);

            // 延迟题目渲染，等待滑出动画完成
            setTimeout(() => {
                if (currentIdx < QUESTIONS.length - 1) {
                    currentIdx++;
                    renderQuestion();
                } else {
                    showResult();
                }
            }, 350);
        }

        // 处理返回
        function handleBack() {
            if (currentIdx === 0 || isAnimating) return;
            isAnimating = true;

            const content = document.getElementById('question-content');
            content.classList.add('slide-out');

            setTimeout(() => {
                const lastScores = history.pop();
                for (let key in lastScores) userScores[key] -= lastScores[key];
                currentIdx--;
                renderQuestion();
            }, 350);
        }

        // 计算并展示结果
        function showResult() {
            const mbti = [
                userScores.I >= userScores.E ? 'I' : 'E',
                userScores.N >= userScores.S ? 'N' : 'S',
                userScores.F >= userScores.T ? 'F' : 'T',
                userScores.J >= userScores.P ? 'J' : 'P'
            ].join('');

            const result = RESULTS[mbti] || RESULTS["INFJ"];
            
            document.getElementById('result-title').innerText = result.title;
            document.getElementById('result-lyrics').innerText = `“${result.lyrics}”`;
            document.getElementById('result-analysis').innerText = result.analysis;
            
            const linkBtn = document.getElementById('music-link');
            if (result.link) {
                linkBtn.href = result.link;
                linkBtn.classList.remove('hidden');
            } else {
                linkBtn.classList.add('hidden');
            }

            showScreen('result-screen');
        }
    </script>
</body>
</html>
